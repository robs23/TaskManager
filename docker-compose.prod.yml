services:
  backend:
    image: ghcr.io/robs23/todo-api:${IMAGE_TAG:-latest}
    container_name: todo-api
    ports:
      - "8080:8080"
    volumes:
      - todoapi-data:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Secret=${JWT_SECRET:?Set JWT_SECRET in .env or shell}
      - ConnectionStrings__TodoDb=Data Source=/data/todos.db
      - FileStoragePath=/data/uploads
    networks:
      - todo-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/robs23/todo-app:${IMAGE_TAG:-latest}
    container_name: todo-app
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - todo-network
    restart: unless-stopped

volumes:
  todoapi-data:

networks:
  todo-network:
    driver: bridge
