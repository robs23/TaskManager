name: Docker Image CI

on:
  push:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and tag Docker image
      run: |
        IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/todo-api
        IMAGE_TAG=${GITHUB_SHA::7}
        docker build . -f backend/TodoApi/Dockerfile -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest

    - name: Push Docker image
      run: |
        IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/todo-api
        docker push $IMAGE_NAME --all-tags

  build-frontend:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and tag Docker image
      run: |
        IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/todo-app
        IMAGE_TAG=${GITHUB_SHA::7}
        docker build . -f frontend/Dockerfile -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest

    - name: Push Docker image
      run: |
        IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/todo-app
        docker push $IMAGE_NAME --all-tags
